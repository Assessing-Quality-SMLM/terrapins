name: Build native binaries (Linux)

on:
  push:
    branches: [main]
    paths:
      - "native/**"
      - "scripts/build-native-linux.sh"
      - ".github/workflows/build-native-linux.yml"
  pull_request:
    paths:
      - "native/**"
      - "scripts/build-native-linux.sh"
      - ".github/workflows/build-native-linux.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build native binaries (Linux)
    runs-on: ubuntu-latest
    env:
      CC: gcc-13
      CXX: g++-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++-13 cmake ninja-build git

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/rust/**/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build native binaries
        run: bash scripts/build-native-linux.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-binaries
          path: native/dist/linux/
          if-no-files-found: error
